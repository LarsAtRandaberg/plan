
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Plan</title>

  <style>
    body { margin: 0; font-family: system-ui, Arial; }

    .topbar {
      display: flex;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid #ddd;
      position: sticky;
      top: 0;
      background: white;
    }

    .menu-btn {
      font-size: 20px;
      cursor: pointer;
      display: none;
    }

    .layout {
      display: flex;
    }

    .sidebar {
      width: 260px;
      border-right: 1px solid #ddd;
      padding: 16px;
      position: sticky;
      top: 60px;
      height: calc(100vh - 60px);
    }

    .content {
      flex: 1;
      padding: 24px;
    }

    @media (max-width: 768px) {

      .menu-btn {
        display: block;
      }

      .sidebar {
        position: fixed;
        left: -260px;
        top: 0;
        height: 100%;
        background: white;
        transition: left 0.3s;
      }

      .sidebar.open {
        left: 0;
      }

    }
  </style>
</head>

<body>

  <div class="topbar">
    <div>PlanPortal</div>
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
  </div>

  <div class="layout">

    <div class="sidebar" id="sidebar">
      <h3>Innhold</h3>
      (kommer senere)
    </div>

    <div class="content">
      <h1 id="tittel">Plan</h1>
      (innhold kommer)
    </div>

  </div>

  <script>
    function toggleMenu() {
      document.getElementById("sidebar").classList.toggle("open");
    }
    
const params = new URLSearchParams(window.location.search);
  const id = params.get("id");

  fetch("https://raw.githubusercontent.com/LarsAtRandaberg/plan/main/data/plan.json")
    .then(res => res.json())
    .then(planer => {
      const plan = planer.find(p => p.planID === id);
      document.getElementById("tittel").innerText = plan ? plan.planNavn : "Plan ikke funnet";
    });
  </script>

</body>
</html>
