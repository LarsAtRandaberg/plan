
<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Plan</title>

  <style>
    :root{
      /* Randaberg fargekart */
      --blue-900:#00223a;
      --blue-800:#003b61;
      --blue-600:#0072bb;
      --blue-200:#c9e7fa;
      --blue-100:#e6f5fe;

      --green-800:#005228;

      --line: var(--blue-200);
      --hover: var(--blue-100);
      --activeBg: var(--blue-200);
      --activeBorder: var(--blue-600);
    }

    body{
      margin:0;
      font-family: system-ui, Arial, sans-serif;
      color: var(--blue-900);
      background:#fff;
    }

    /* TOPP */
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:12px 16px;
      border-bottom:1px solid var(--line);
      position:sticky;
      top:0;
      background:#fff;
      z-index:100;
    }

    .menu-btn{
      font-size:20px;
      cursor:pointer;
      display:none;
      user-select:none;
    }

    /* LAYOUT */
    .layout{
      display:flex;
      min-height:calc(100vh - 56px);
    }

    /* SIDEBAR */
    .sidebar{
      width:240px;
      border-right:1px solid var(--line);
      padding:10px 8px;
      position:sticky;
      top:56px;
      height:calc(100vh - 56px);
      overflow-y:auto;
      background:#fff;
      z-index:90;
    }

    .sidebar h3{
      margin:0 0 8px 0;
      font-size:14px;
      color: var(--blue-800);
    }

    /* INNHOLD */
    .content{
      flex:1;
      padding:24px;
    }

    section{
      margin-bottom:18px;
    }

    /* MENY: grunnstil */
    #menu a{
      display:block;
      padding:4px 6px;
      margin:0 0 2px 0;
      border-radius:6px;
      text-decoration:none;
      color: var(--blue-800);
      line-height:1.12;
      font-size:13px;
    }

    #menu a:hover{
      background: var(--hover);
    }

    #menu a.active{
      background: var(--activeBg);
      color: var(--blue-900);
      font-weight:600;
      border-left:3px solid var(--activeBorder);
      padding-left:5px; /* kompenser for border */
    }

    /* Tree/accordion */
    #menu .node{ display:block; }
    #menu .row{
      display:flex;
      align-items:center;
      gap:3px;
    }

    /* Toggle tar minst mulig plass */
    #menu .toggle{
      width:16px;
      height:16px;
      border:0;
      background:none;
      cursor:pointer;
      border-radius:4px;
      line-height:1;
      color: var(--blue-800);
    }
    #menu .toggle:hover{ background: var(--hover); }
    #menu .toggle::before{ content:"▸"; }
    #menu .node.open > .row .toggle::before{ content:"▾"; }
    #menu .toggle.placeholder{ visibility:hidden; }

    /* Children: ingen innrykk her (innrykk styres kun av level på .row) */
    #menu .children{
      display:none;
      margin:0;
      padding:0;
      border:0;
    }
    #menu .node.open > .children{ display:block; }

    /* Entydig innrykk per nivå (ALDRI dobbel innrykk) */
    #menu .row.level-0{ padding-left:0; }
    #menu .row.level-1{ padding-left:0; }
    #menu .row.level-2{ padding-left:10px; border-left:1px solid var(--line); }
    #menu .row.level-3{ padding-left:20px; border-left:1px solid var(--line); }

    /* Typografi per nivå (hierarki uten å bruke masse innrykk) */
    #menu .row.level-0 a{ font-weight:700; color: var(--green-800); }
    #menu .row.level-1 a{ font-weight:600; color: var(--blue-800); }
    #menu .row.level-2 a,
    #menu .row.level-3 a{ font-weight:400; color: var(--blue-800); }

    /* Nivå 0: alltid åpent + ingen toggle */
    #menu .node.level-0 > .children{ display:block; }
    #menu .node.level-0 .toggle{ display:none; }
    #menu .node.level-0 .row{ gap:0; }

    /* MOBIL */
    @media (max-width: 768px){
      .menu-btn{ display:block; }
      .layout{ display:block; }

      .sidebar{
        position:fixed;
        left:-280px;
        top:0;
        height:100%;
        width:240px;
        z-index:200;
        transition:left 0.25s;
        box-shadow:0 10px 30px rgba(0,0,0,.12);
        border-right:1px solid var(--line);
      }
      .sidebar.open{ left:0; }
    }
    /* Tydelig, men lett toggle-ikon */
#menu .toggle {
  width: 16px;
  height: 16px;
  font-size: 12px;
  color: var(--blue-800);
  opacity: 0.9;
}

#menu .toggle::before {
  content: "▸";
}

#menu .node.open > .row .toggle::before {
  content: "▾";
}

/* Litt mer “klikkflate” uten å stjele plass visuelt */
#menu .toggle {
  padding: 0;
}

  </style>
</head>

<body>
  <div class="topbar">
    <div>PlanPortal</div>
    <div class="menu-btn" id="menuBtn">☰</div>
  </div>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <h3>Innhold</h3>
      <div id="menu"></div>
    </aside>

    <main class="content">
      <h1 id="tittel">Plan</h1>
      <div id="innhold"></div>
    </main>
  </div>

  <script>
    (function () {
      const sidebar = document.getElementById("sidebar");
      const menuBtn = document.getElementById("menuBtn");
      const menuEl = document.getElementById("menu");
      const contentEl = document.getElementById("innhold");
      const titleEl = document.getElementById("tittel");

      const params = new URLSearchParams(window.location.search);
      const planId = params.get("id");

      const URL_PLAN = "https://raw.githubusercontent.com/LarsAtRandaberg/plan/main/data/plan.json";
      const URL_MAAL = "https://raw.githubusercontent.com/LarsAtRandaberg/plan/main/data/maal.json";

      menuBtn.addEventListener("click", () => {
        sidebar.classList.toggle("open");
      });

      function safeId(text) {
        return String(text || "")
          .toLowerCase()
          .replace(/[^a-z0-9\-]/g, "-")
          .replace(/\-+/g, "-")
          .replace(/^\-|\-$/g, "");
      }

      function setActiveLink(activeSectionId) {
        // Marker aktiv lenke
        document.querySelectorAll("#menu a").forEach(a => {
          const isActive = a.getAttribute("href") === `#${activeSectionId}`;
          a.classList.toggle("active", isActive);
          if (isActive) a.setAttribute("aria-current", "true");
          else a.removeAttribute("aria-current");
        });

        // Hold kun aktiv sti åpen (så scroll ikke åpner "alt")
        const activeLink = document.querySelector(`#menu a[href="#${activeSectionId}"]`);
        if (!activeLink) return;

        const path = [];
        let node = activeLink.closest(".node");

        while (node) {
          path.push(node);
          const parent = node.parentElement;              // .children eller #menu
          node = parent ? parent.closest(".node") : null;
        }

        const pathSet = new Set(path);

        // Lukk alle åpne som ikke er i aktiv sti (men aldri nivå 0)
        document.querySelectorAll("#menu .node.open").forEach(n => {
          if (n.classList.contains("level-0")) return;
          if (!pathSet.has(n)) n.classList.remove("open");
        });

        // Åpne aktiv sti
        path.forEach(n => n.classList.add("open"));
      }

      function setupScrollSpy() {
        const sections = Array.from(document.querySelectorAll("main section[id]"));
        if (sections.length === 0) return;

        const observer = new IntersectionObserver((entries) => {
          const visible = entries
            .filter(e => e.isIntersecting)
            .sort((a, b) => a.boundingClientRect.top - b.boundingClientRect.top);

          if (visible.length > 0) setActiveLink(visible[0].target.id);
        }, {
          root: null,
          rootMargin: "0px 0px -70% 0px",
          threshold: 0.01
        });

        sections.forEach(s => observer.observe(s));
        setActiveLink(sections[0].id);
      }

      function ensureSection(m) {
        const anchorId = `maal-${safeId(m.maalID)}`;
        if (document.getElementById(anchorId)) return anchorId;

        const section = document.createElement("section");
        section.id = anchorId;
        section.innerHTML = `<h2>${m.maalNavn || "(uten navn)"}</h2>`;
        contentEl.appendChild(section);
        return anchorId;
      }

      function renderNodeFactory(children) {
        const collator = new Intl.Collator("nb", { sensitivity: "base" });

        // Sorter alle "barnelister" alfabetisk én gang
        for (const arr of children.values()) {
          arr.sort((a, b) => collator.compare(a.maalNavn || "", b.maalNavn || ""));
        }

        function renderNode(m, level) {
          const anchorId = ensureSection(m);

          const node = document.createElement("div");
          node.className = `node level-${Math.min(level, 3)}`;

          // Nivå 0 skal alltid være åpent
          if (level === 0) node.classList.add("open");

          const row = document.createElement("div");
          row.className = `row level-${Math.min(level, 3)}`;

          const kids = children.get(m.maalID) || [];
          const hasKids = (level !== 0) && (kids.length > 0);

          const toggle = document.createElement("button");
          toggle.type = "button";
          toggle.className = hasKids ? "toggle" : "toggle placeholder";
          toggle.setAttribute("aria-label", hasKids ? "Åpne/lukke" : "");

          toggle.addEventListener("click", () => {
            if (!hasKids) return;

            const parent = node.parentElement; // .children eller #menu
            const willOpen = !node.classList.contains("open");

            // Bare én åpen pr nivå: lukk søsken hvis vi åpner
            if (willOpen && parent) {
              Array.from(parent.children).forEach(el => {
                if (el !== node && el.classList && el.classList.contains("node")) {
                  el.classList.remove("open");
                }
              });
            }
            node.classList.toggle("open");
          });

          const link = document.createElement("a");
          link.href = `#${anchorId}`;
          link.innerText = m.maalNavn || "(uten navn)";
          link.addEventListener("click", () => {
            if (window.matchMedia("(max-width: 768px)").matches) {
              sidebar.classList.remove("open");
            }
          });

          row.appendChild(toggle);
          row.appendChild(link);
          node.appendChild(row);

          const childWrap = document.createElement("div");
          childWrap.className = "children";
          node.appendChild(childWrap);

          kids.forEach(k => childWrap.appendChild(renderNode(k, level + 1)));

          return node;
        }

        return renderNode;
      }

      async function init() {
        // Hvis ingen id: vis enkel beskjed (du kan senere gjøre dette om til planliste)
        if (!planId) {
          titleEl.innerText = "Velg en plan";
          contentEl.innerHTML = "<p>Åpne en plan fra oversikten (index.html) slik at URL-en inneholder <code>?id=...</code>.</p>";
          return;
        }

        // Sett tittel
        fetch(URL_PLAN)
          .then(r => r.json())
          .then(planer => {
            const plan = planer.find(p => p.planID === planId);
            titleEl.innerText = plan ? plan.planNavn : "Plan ikke funnet";
          });

        // Bygg meny + innhold
        const maal = await fetch(URL_MAAL).then(r => r.json());

        const maalForPlan = maal
          .filter(m => m.maalPlan === planId)
          .filter(m => m.maalPlan);

        menuEl.innerHTML = "";
        contentEl.innerHTML = "";

        if (maalForPlan.length === 0) {
          contentEl.innerHTML = "<p>Ingen mål funnet for denne planen.</p>";
          return;
        }

        const byId = new Map(maalForPlan.map(m => [m.maalID, m]));

        // children: parentId -> [barn]
        const children = new Map();
        function addChild(parentId, child) {
          if (!children.has(parentId)) children.set(parentId, []);
          children.get(parentId).push(child);
        }

        maalForPlan.forEach(m => {
          const parentId = m.maalOverordnet;
          if (parentId && byId.has(parentId)) addChild(parentId, m);
          else addChild(null, m);
        });

        const renderNode = renderNodeFactory(children);

        // Render toppnivå
        (children.get(null) || []).forEach(m => {
          menuEl.appendChild(renderNode(m, 0));
        });

        // Start scroll-spy når seksjoner finnes
        setupScrollSpy();
      }

      init();
    })();
  </script>
</body>
</html>
