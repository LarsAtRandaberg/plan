
<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Plan</title>

  <style>
    :root{
      /* Randaberg fargekart */
      --blue-900:#00223a;
      --blue-800:#003b61;
      --blue-600:#0072bb;
      --blue-200:#c9e7fa;
      --blue-100:#e6f5fe;

      --green-800:#005228;

      --line: var(--blue-200);
      --hover: var(--blue-100);
      --activeBg: var(--blue-200);
      --activeBorder: var(--blue-600);
    }

    body{
      margin:0;
      font-family: system-ui, Arial, sans-serif;
      color: var(--blue-900);
      background:#fff;
    }

    /* TOPP */
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:12px 16px;
      border-bottom:1px solid var(--line);
      position:sticky;
      top:0;
      background:#fff;
      z-index:100;
    }

    .menu-btn{
      font-size:20px;
      cursor:pointer;
      display:none;
      user-select:none;
    }

    /* LAYOUT */
    .layout{
      display:flex;
      min-height:calc(100vh - 56px);
    }

    /* SIDEBAR */
    .sidebar{
      width:240px;
      border-right:1px solid var(--line);
      padding:10px 8px;
      position:sticky;
      top:56px;
      height:calc(100vh - 56px);
      overflow-y:auto;
      background:#fff;
      z-index:90;
    }

    .sidebar h3{
      margin:0 0 8px 0;
      font-size:14px;
      color: var(--blue-800);
    }

    /* INNHOLD */
    .content{
      flex:1;
      padding:24px;
    }

    section{
      margin-bottom:18px;
    }

    /* MENY: grunnstil */
    #menu a{
      display:block;
      padding:4px 6px;
      margin:0 0 2px 0;
      border-radius:6px;
      text-decoration:none;
      color: var(--blue-800);
      line-height:1.12;
      font-size:13px;
    }

    #menu a:hover{
      background: var(--hover);
    }

    #menu a.active{
      background: var(--activeBg);
      color: var(--blue-900);
      font-weight:600;
      border-left:3px solid var(--activeBorder);
      padding-left:5px; /* kompenser for border */
    }

    /* Tree/accordion */
    #menu .node{ display:block; }
    #menu .row{
      display:flex;
      align-items:center;
      gap:3px;
    }

    /* Toggle tar minst mulig plass */
    #menu .toggle{
      width:16px;
      height:16px;
      border:0;
      background:none;
      cursor:pointer;
      border-radius:4px;
      line-height:1;
      color: var(--blue-800);
    }
    #menu .toggle:hover{ background: var(--hover); }
    #menu .toggle::before{ content:"▸"; }
    #menu .node.open > .row .toggle::before{ content:"▾"; }
    #menu .toggle.placeholder{ visibility:hidden; }

    /* Children: ingen innrykk her (innrykk styres kun av level på .row) */
    #menu .children{
      display:none;
      margin:0;
      padding:0;
      border:0;
    }
    #menu .node.open > .children{ display:block; }

    /* Entydig innrykk per nivå (ALDRI dobbel innrykk) */
    #menu .row.level-0{ padding-left:0; }
    #menu .row.level-1{ padding-left:0; }
    #menu .row.level-2{ padding-left:10px; border-left:1px solid var(--line); }
    #menu .row.level-3{ padding-left:20px; border-left:1px solid var(--line); }

    /* Typografi per nivå (hierarki uten å bruke masse innrykk) */
    #menu .row.level-0 a{ font-weight:700; color: var(--green-800); }
    #menu .row.level-1 a{ font-weight:600; color: var(--blue-800); }
    #menu .row.level-2 a,
    #menu .row.level-3 a{ font-weight:400; color: var(--blue-800); }

    /* Nivå 0: alltid åpent + ingen toggle */
    #menu .node.level-0 > .children{ display:block; }
    #menu .node.level-0 > .row .toggle { display: none; }
    #menu .node.level-0 > .row { gap: 0; }


    /* MOBIL */
    @media (max-width: 768px){
      .menu-btn{ display:block; }
      .layout{ display:block; }

      .sidebar{
        position:fixed;
        left:-280px;
        top:0;
        height:100%;
        width:240px;
        z-index:200;
        transition:left 0.25s;
        box-shadow:0 10px 30px rgba(0,0,0,.12);
        border-right:1px solid var(--line);
      }
      .sidebar.open{ left:0; }
    }
    /* Tydelig, men lett toggle-ikon */
#menu .toggle {
  width: 16px;
  height: 16px;
  font-size: 12px;
  color: var(--blue-800);
  opacity: 0.9;
}

#menu .toggle::before {
  content: "▸";
}

#menu .node.open > .row .toggle::before {
  content: "▾";
}

/* Litt mer “klikkflate” uten å stjele plass visuelt */
#menu .toggle {
  padding: 0;
}

  </style>
</head>

<body>
  <div class="topbar">
    <div>PlanPortal</div>
    <div class="menu-btn" id="menuBtn">☰</div>
  </div>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <h3>Innhold</h3>
      <div id="menu"></div>
    </aside>

    <main class="content">
      <h1 id="tittel">Plan</h1>
      <div id="innhold"></div>
    </main>
  </div>

 <script src="app.js"></script
</body>
</html>
