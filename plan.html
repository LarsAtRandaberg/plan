<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Plan</title>

  <style>
    body { margin: 0; font-family: system-ui, Arial; }

    /* TOPP */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid #ddd;
      position: sticky;
      top: 0;
      background: white;
      z-index: 100;
    }

    .menu-btn {
      font-size: 20px;
      cursor: pointer;
      display: none;
      user-select: none;
    }

    /* LAYOUT */
    .layout {
      display: flex;
      min-height: calc(100vh - 56px);
    }

    /* VENSTREMENY */
    .sidebar {
      width: 260px;
      border-right: 1px solid #ddd;
      padding: 16px;
      position: sticky;
      top: 56px; /* omtrent høyden på .topbar */
      height: calc(100vh - 56px);
      overflow-y: auto;
      background: white;
    }

    .sidebar a {
      display: block;
      margin-bottom: 8px;
      text-decoration: none;
      color: #000;
      padding: 6px 8px;
      border-radius: 6px;
    }

    .sidebar a:hover {
      background: #f2f2f2;
    }

    /* INNHOLD */
    .content {
      flex: 1;
      padding: 24px;
    }

    section {
      margin-bottom: 18px;
    }

    /* MOBIL */
    @media (max-width: 768px) {
      .menu-btn {
        display: block; /* <-- rettet (var .-btn hos deg) */
      }

      .layout {
        display: block;
      }

      .sidebar {
        position: fixed;
        left: -280px;
        top: 0;
        height: 100%;
        width: 260px;
        z-index: 200;
        transition: left 0.3s;
        box-shadow: 0 10px 30px rgba(0,0,0,.12);
      }

      .sidebar.open {
        left: 0;
      }
    }
    
#menu a {
  display: block;
  padding: 6px 8px;
  margin: 0 0 6px 0;
  border-radius: 6px;
  text-decoration: none;
  color: #111;
  line-height: 1.2;
}

#menu a:hover {
  background: #f2f2f2;
}

/* Scroll-spy: aktiv lenke */
#menu a.active {
  background: #e8f0ff;
  font-weight: 600;
}
/* Hierarki i venstremeny */
#menu .menu-item {
  display: block;
}

#menu .level-0 { padding-left: 0; }
#menu .level-1 { padding-left: 14px; }
#menu .level-2 { padding-left: 28px; }
#menu .level-3 { padding-left: 42px; }

/* En tynn “guideline” gjør hierarki lettere å lese */
#menu .level-1, #menu .level-2, #menu .level-3 {
  border-left: 2px solid #eee;
}
    #menu .menu-item { display: block; }
#menu .level-0 { padding-left: 0; }
#menu .level-1 { padding-left: 14px; border-left: 2px solid #eee; }
#menu .level-2 { padding-left: 28px; border-left: 2px solid #eee; }
#menu .level-3 { padding-left: 42px; border-left: 2px solid #eee; }
    /* Tree/accordion */
#menu .node {
  display: block;
}

#menu .row {
  display: flex;
  align-items: center;
  gap: 6px;
}

#menu .toggle {
  width: 22px;
  height: 22px;
  border: 0;
  background: none;
  cursor: pointer;
  border-radius: 6px;
  line-height: 1;
}

#menu .toggle:hover {
  background: #f2f2f2;
}

#menu .toggle::before {
  content: "▸";
  display: inline-block;
  transform: translateY(-1px);
}

#menu .node.open > .row .toggle::before {
  content: "▾";
}

#menu .children {
  display: none;
  margin-left: 14px;
  padding-left: 12px;
  border-left: 2px solid #eee;
}

#menu .node.open > .children {
  display: block;
}

/* Når node ikke har barn: skjul toggle-knappen visuelt, men hold “plass” */
#menu .toggle.placeholder {
  visibility: hidden;
}
  </style>
</head>

<body>

  <div class="topbar">
    <div>PlanPortal</div>
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
  </div>

  <div class="layout">

    <aside class="sidebar" id="sidebar">
      <h3>Innhold</h3>
      <div id="menu"></div>
    </aside>

    <main class="content">
      <h1 id="tittel">Plan</h1>
      <div id="innhold"></div>
    </main>

  </div>

  <script>
  function toggleMenu() {
    document.getElementById("sidebar").classList.toggle("open");
  }

  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");

  function safeId(text) {
    return String(text || "")
      .toLowerCase()
      .replace(/[^a-z0-9\-]/g, "-")
      .replace(/\-+/g, "-")
      .replace(/^\-|\-$/g, "");
  }

  function setActiveLink(activeSectionId) {
    document.querySelectorAll("#menu a").forEach(a => {
      const isActive = a.getAttribute("href") === `#${activeSectionId}`;
      a.classList.toggle("active", isActive);
      if (isActive) {
        a.setAttribute("aria-current", "true");
      } else {
        a.removeAttribute("aria-current");
      }
    });
    
// Auto-åpne alle foreldre-noder for aktiv seksjon
const activeLink = document.querySelector(`#menu a[href="#${activeSectionId}"]`);
if (activeLink) {
  let el = activeLink.closest(".node");
  while (el) {
    el.classList.add("open");
    el = el.parentElement ? el.parentElement.closest(".node") : null;
  }
}

  }

  function setupScrollSpy() {
    const sections = Array.from(document.querySelectorAll("main section[id]"));
    if (sections.length === 0) return;

    const observer = new IntersectionObserver((entries) => {
      // Velg den øverste synlige seksjonen
      const visible = entries
        .filter(e => e.isIntersecting)
        .sort((a, b) => a.boundingClientRect.top - b.boundingClientRect.top);

      if (visible.length > 0) {
        setActiveLink(visible[0].target.id);
      }
    }, {
      root: null,
      // Trigger litt før seksjonen er helt øverst, så markering føles riktig
      rootMargin: "0px 0px -70% 0px",
      threshold: 0.01
    });

    sections.forEach(s => observer.observe(s));
    setActiveLink(sections[0].id);
  }

  // Hent mål og bygg venstremeny + innhold
  // Hent mål og bygg venstremeny (hierarki) + innhold
fetch("https://raw.githubusercontent.com/LarsAtRandaberg/plan/main/data/maal.json")
  .then(res => res.json())
  .then(maal => {
    const meny = document.getElementById("menu");
    const innhold = document.getElementById("innhold");

    meny.innerHTML = "";
    innhold.innerHTML = "";

    // 1) Filtrer til valgt plan
    const maalForPlan = maal
      .filter(m => m.maalPlan === id)
      .filter(m => m.maalPlan);

    if (maalForPlan.length === 0) {
      innhold.innerHTML = "<p>Ingen mål funnet for denne planen.</p>";
      return;
    }

    // 2) Index på maalID -> mål
    const byId = new Map(maalForPlan.map(m => [m.maalID, m]));

    // 3) Bygg children-liste pr forelder
    const children = new Map();
    function addChild(parentId, child) {
      if (!children.has(parentId)) children.set(parentId, []);
      children.get(parentId).push(child);
    }

    maalForPlan.forEach(m => {
      const parentId = m.maalOverordnet;
      if (parentId && byId.has(parentId)) addChild(parentId, m);
      else addChild(null, m);
    });

    // 4) Lag seksjoner i innholdet (én per mål)
    function ensureSection(m) {
      const anchorId = `maal-${safeId(m.maalID)}`;
      if (document.getElementById(anchorId)) return anchorId;

      const section = document.createElement("section");
      section.id = anchorId;
      section.innerHTML = `<h2>${m.maalNavn || "(uten navn)"}</h2>`;
      innhold.appendChild(section);
      return anchorId;
    }

    // 5) Bygg hierarkisk meny (rekursivt)
function renderNode(m, level) {
  const anchorId = ensureSection(m);

  const node = document.createElement("div");
  node.className = "node";
  node.dataset.anchor = anchorId; // brukes for auto-åpning ved scroll-spy

  const row = document.createElement("div");
  row.className = `row level-${Math.min(level, 3)}`;

  const kids = (children.get(m.maalID) || []);
  const hasKids = kids.length > 0;

  const toggle = document.createElement("button");
  toggle.type = "button";
  toggle.className = hasKids ? "toggle" : "toggle placeholder";
  toggle.setAttribute("aria-label", hasKids ? "Åpne/lukke" : "");
  toggle.addEventListener("click", () => {
    if (!hasKids) return;
    node.classList.toggle("open");
  });

  const a = document.createElement("a");
  a.href = `#${anchorId}`;
  a.innerText = m.maalNavn || "(uten navn)";

  a.addEventListener("click", () => {
    // Lukk meny på mobil når man navigerer
    if (window.matchMedia("(max-width: 768px)").matches) {
      document.getElementById("sidebar").classList.remove("open");
    }
  });

  row.appendChild(toggle);
  row.appendChild(a);
  node.appendChild(row);

  const childWrap = document.createElement("div");
  childWrap.className = "children";
  node.appendChild(childWrap);

  // Standard: åpne toppnivå på desktop, lukket på mobil
  const desktop = !window.matchMedia("(max-width: 768px)").matches;
  if (desktop && level === 0 && hasKids) node.classList.add("open");

  // Render barn inn i childWrap
  kids.forEach(k => childWrap.appendChild(renderNode(k, level + 1)));

  return node;
}

    // 6) Render toppnivå
    // Sortering: alfabetisk (norsk) på maalNavn
const collator = new Intl.Collator("nb", { sensitivity: "base" });

for (const [parentId, arr] of children.entries()) {
  arr.sort((a, b) => collator.compare(a.maalNavn || "", b.maalNavn || ""));
}

    (children.get(null) || []).forEach(m => {
  meny.appendChild(renderNode(m, 0));
});

    // 7) Start scroll-spy
    setupScrollSpy();
  });

  // Hent plan og sett tittel
  fetch("https://raw.githubusercontent.com/LarsAtRandaberg/plan/main/data/plan.json")
    .then(res => res.json())
    .then(planer => {
      const plan = planer.find(p => p.planID === id);
      document.getElementById("tittel").innerText = plan ? plan.planNavn : "Plan ikke funnet";
    });
</script>
