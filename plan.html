<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Plan</title>

  <style>
    body { margin: 0; font-family: system-ui, Arial; }

    /* TOPP */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid #ddd;
      position: sticky;
      top: 0;
      background: white;
      z-index: 100;
    }

    .menu-btn {
      font-size: 20px;
      cursor: pointer;
      display: none;
      user-select: none;
    }

    /* LAYOUT */
    .layout {
      display: flex;
      min-height: calc(100vh - 56px);
    }

    /* VENSTREMENY */
    .sidebar {
      width: 260px;
      border-right: 1px solid #ddd;
      padding: 16px;
      position: sticky;
      top: 56px; /* omtrent høyden på .topbar */
      height: calc(100vh - 56px);
      overflow-y: auto;
      background: white;
    }

    .sidebar a {
      display: block;
      margin-bottom: 8px;
      text-decoration: none;
      color: #000;
      padding: 6px 8px;
      border-radius: 6px;
    }

    .sidebar a:hover {
      background: #f2f2f2;
    }

    /* INNHOLD */
    .content {
      flex: 1;
      padding: 24px;
    }

    section {
      margin-bottom: 18px;
    }

    /* MOBIL */
    @media (max-width: 768px) {
      .menu-btn {
        display: block; /* <-- rettet (var .-btn hos deg) */
      }

      .layout {
        display: block;
      }

      .sidebar {
        position: fixed;
        left: -280px;
        top: 0;
        height: 100%;
        width: 260px;
        z-index: 200;
        transition: left 0.3s;
        box-shadow: 0 10px 30px rgba(0,0,0,.12);
      }

      .sidebar.open {
        left: 0;
      }
    }
  </style>
</head>

<body>

  <div class="topbar">
    <div>PlanPortal</div>
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
  </div>

  <div class="layout">

    <aside class="sidebar" id="sidebar">
      <h3>Innhold</h3>
      <div id="menu"></div>
    </aside>

    <main class="content">
      <h1 id="tittel">Plan</h1>
      <div id="innhold"></div>
    </main>

  </div>

  <script>
    function toggleMenu() {
      document.getElementById("sidebar").classList.toggle("open");
    }

    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    // Hent mål og bygg venstremeny + innhold
    fetch("https://raw.githubusercontent.com/LarsAtRandaberg/plan/main/data/maal.json")
      .then(res => res.json())
      .then(maal => {
        const meny = document.getElementById("menu");
        const innhold = document.getElementById("innhold");

        meny.innerHTML = "";
        innhold.innerHTML = "";

        // Filtrer: mål som hører til valgt plan
        const maalForPlan = maal
          .filter(m => m.maalPlan === id)
          .filter(m => m.maalPlan); // fjerner null

        maalForPlan.forEach((m, index) => {
          const anchorId = `maal-${index + 1}`;

          // Venstremeny-lenke
          const a = document.createElement("a");
          a.href = `#${anchorId}`;
          a.innerText = m.maalNavn || "(uten navn)";
          meny.appendChild(a);

          // Seksjon i innhold
          const section = document.createElement("section");
          section.id = anchorId;
