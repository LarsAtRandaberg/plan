<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Planportal</title>
</head>
<body>

<h1>Planer</h1>

<div id="planer"></div>

<script>
fetch("https://raw.githubusercontent.com/LarsAtRandaberg/plan/main/data/plan.json")
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById("planer");

    data.forEach(plan => {
      const div = document.createElement("div");
      div.innerText = plan.planNavn;
      container.appendChild(div);
    });
  });
</script>

</body>
</html>
