<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PlanPortal v2 - Randaberg kommune</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="styles-v2.css">
</head>
<body class="page-v2" data-mode="plan">

<div class="topbar">
  <div class="topbar-main">
    <div class="brand">
      <a class="brand-link" href="./">
        <img src="EPSHovedlogo_Våpen_PNG.png" alt="Randaberg kommune" class="brand-logo">
        <span class="brand-name">Randaberg<br>kommune</span>
      </a>
    </div>
    <nav class="topnav" id="topnav" aria-label="Planvelger"></nav>
  </div>

  <div class="topbar-strip">
    <div class="topbar-context">
      <button type="button" class="menu-btn" id="menuBtn" aria-label="Åpne meny">
        <i class="ti ti-layout-sidebar-left-expand" aria-hidden="true"></i>
      </button>

      <div class="mode-switch" role="tablist" aria-label="Visningsmodus">
        <button type="button" class="mode-chip is-active" data-mode-target="plan" role="tab" aria-selected="true">Plan</button>
        <button type="button" class="mode-chip" data-mode-target="rapport" role="tab" aria-selected="false">Rapport</button>
      </div>

      <button type="button" class="year-pill" aria-label="Valgt år">2026</button>
    </div>

    <div class="topbar-actions">
      <div class="search-wrapper" id="search-wrapper">
        <i class="ti ti-search search-icon" aria-hidden="true"></i>
        <input type="search" id="search-input" class="search-input" placeholder="Søk i alle planer" autocomplete="off" />
        <div class="search-results" id="search-results"></div>
      </div>
      <button type="button" class="search-btn" id="searchBtn" aria-label="Åpne søk">
        <i class="ti ti-search" aria-hidden="true"></i>
      </button>
    </div>
  </div>
</div>

<div class="hero hero-v2">
  <div class="hero-content">
    <div class="hero-kicker-row">
      <div class="hero-label" id="tittel">Laster...</div>
      <span class="mode-badge" id="mode-badge">Planmodus</span>
    </div>
    <h1 class="hero-title" id="hero-tittel"></h1>
    <div class="hero-meta">
      <span class="hero-stat">
        <i class="ti ti-target" aria-hidden="true"></i>
        <span id="hero-maal-count">-</span> mål
      </span>
      <span class="hero-stat hero-stat-note" id="mode-summary">
        Planinnhold og navigasjon følger valgt mål.
      </span>
    </div>
  </div>
</div>

<div class="layout">
  <aside class="sidebar" id="sidebar" aria-label="Kontekstmeny">
    <div class="sidebar-v2-header">
      <div>
        <div class="sidebar-v2-kicker" id="sidebar-mode-label">Plan</div>
        <strong id="sidebar-panel-title">Planmeny</strong>
      </div>
      <button type="button" class="sidebar-close-btn" id="sidebarCloseBtn" aria-label="Lukk meny">
        <i class="ti ti-x" aria-hidden="true"></i>
      </button>
    </div>
    <div id="menu-topnav"></div>
    <div id="menu"></div>
  </aside>

  <main class="content">
    <div class="mode-intro-card" id="mode-intro-card">
      <div class="mode-intro-kicker">Plan</div>
      <div class="mode-intro-title">Planstruktur og mål</div>
      <p>I planmodus er planhierarkiet primærnavigasjon. På mobil blir toppbaren komprimert til en trygg, synlig stripe når du scroller ned.</p>
    </div>
    <div id="innhold"></div>
  </main>
</div>

<button type="button" class="peek-button" id="peekButton" aria-label="Åpne meny">
  <i class="ti ti-layout-sidebar-left-expand" aria-hidden="true"></i>
  <span id="peekButtonLabel">Plan</span>
</button>
<div class="page-overlay" id="pageOverlay" hidden></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="app.js"></script>
<script src="app-v2.js"></script>
</body>
</html>
